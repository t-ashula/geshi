name: ci

on:
  pull_request:
  push:
    branches:
      - master

jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_DB: geshi
          POSTGRES_USER: geshi
          POSTGRES_PASSWORD: geshi
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U geshi -d geshi"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      TEST_DATABASE_URL: postgres://geshi:geshi@127.0.0.1:5432/geshi

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit test
        run: npm test

      - name: Mid test
        run: npm run test:mid

      - name: Build
        run: npm run build
