services:
  postgres:
    image: postgres:18.3-alpine3.23
    profiles: ["dev", "e2e"]
    environment:
      POSTGRES_DB: geshi
      POSTGRES_PASSWORD: geshi
      POSTGRES_USER: geshi
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U geshi -d geshi"]
      interval: 5s
      timeout: 5s
      retries: 12
    ports:
      - "55432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql

  dashboard:
    image: node:24-bookworm-slim
    profiles: ["dev"]
    working_dir: /app
    command: sh -c "npm install -g @pg-boss/dashboard && pg-boss-dashboard"
    environment:
      DATABASE_URL: postgres://geshi:geshi@postgres:5432/geshi
      PGBOSS_SCHEMA: pgboss
      PORT: 3000
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "53000:3000"

volumes:
  postgres-data:
