services:
  redis:
    image: redis:8-alpine
    ports:
      - "6379:6379"

  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: geshi
      POSTGRES_USER: geshi
      POSTGRES_PASSWORD: geshi
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U geshi -d geshi"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    name: geshi_backend_store_postgres_data
