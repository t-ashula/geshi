services:
  postgres:
    image: postgres:18.3-alpine3.23
    environment:
      POSTGRES_DB: geshi
      POSTGRES_PASSWORD: geshi
      POSTGRES_USER: geshi
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U geshi -d geshi"]
      interval: 5s
      timeout: 5s
      retries: 12
    ports:
      - "55433:5432"
    volumes:
      - postgres-test-data:/var/lib/postgresql

volumes:
  postgres-test-data:
